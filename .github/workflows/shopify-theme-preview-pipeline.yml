name: Shopify Theme Preview Pipeline

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  debug-top:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "GITHUB_HEAD_REF=${GITHUB_HEAD_REF}"
          echo "needs_deployment=${{ needs.needs-deployment.outputs.needs_deployment || 'unset' }}"

  needs-deployment:
    name: "Check if Deployment is Needed"
    uses: ./.github/workflows/needs-deployment.yml

  generate-theme-name:
    name: "Generate Theme Name"
    needs: [needs-deployment]
    if: ${{ needs.needs-deployment.outputs.needs_deployment }}
    runs-on: ubuntu-latest
    outputs:
      theme_name: ${{ steps.generate_theme_name.outputs.theme_name }}
    steps:
      - name: Generate theme name
        id: generate_theme_name
        run: |
          echo "theme_name=${GITHUB_HEAD_REF}" >> "$GITHUB_OUTPUT"

  deploy-theme:
    name: "Deploy Theme"
    needs: [needs-deployment, generate-theme-name]
    if: ${{ needs.needs-deployment.outputs.needs_deployment }}
    uses: ./.github/workflows/shopify-theme-deploy.yml
    secrets:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      THEME_ACCESS_PASSWORD: ${{ secrets.THEME_ACCESS_PASSWORD }}
    with:
      theme_name: ${{ needs.generate-theme-name.outputs.theme_name }}
      deploy_sha: ${{ github.sha }}

  check-outputs:
    needs: [deploy-theme]
    runs-on: ubuntu-latest
    steps:
      - name: List all outputs
        run: |
          echo "Deploy outputs:"
          for key in preview_url editor_url theme_name deploy_sha; do
            echo "$key=${{ needs.deploy-theme.outputs[$key] }}"
          done

  debug-deploy-outputs:
    name: "Debug Deploy Outputs"
    needs: [deploy-theme]
    runs-on: ubuntu-latest
    steps:
      - name: Print deploy result and preview URL
        run: |
          echo "RESULT=${{ needs.deploy-theme.result }}"
          echo "PREVIEW=${{ needs.deploy-theme.outputs.preview_url }}"

      - name: Print deploy outputs
        run: |
          echo "preview_url: '${{ needs.deploy-theme.outputs.preview_url }}'"
          echo "theme_name: '${{ needs.deploy-theme.outputs.theme_name }}'"
      - name: Write job summary
        run: |
          {
            echo "## Deploy Outputs"
            echo ""
            echo "- preview_url: \`${{ needs.deploy-theme.outputs.preview_url }}\`"
            echo "- theme_name: \`${{ needs.deploy-theme.outputs.theme_name }}\`"
          } >> $GITHUB_STEP_SUMMARY

  pr-preview-comment:
    name: "PR Comment with Theme Preview"
    needs: [deploy-theme]
    if: ${{ needs.deploy-theme.result == 'success' && needs.deploy-theme.outputs.preview_url }}
    uses: ./.github/workflows/shopify-theme-preview-comment.yml
    permissions:
      issues: write
      pull-requests: write
      statuses: write
    with:
      preview_url: ${{ needs.deploy-theme.outputs.preview_url }}
      editor_url: ${{ needs.deploy-theme.outputs.editor_url }}
      theme_name: ${{ needs.deploy-theme.outputs.theme_name }}
      deploy_sha: ${{ needs.deploy-theme.outputs.deploy_sha }}
