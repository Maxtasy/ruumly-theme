name: PR Preview comment

on:
  workflow_call:
    inputs:
      theme_id:
        required: true
        type: string
      theme_name:
        required: true
        type: string
    secrets:
      SHOPIFY_STORE:
        required: true

permissions:
  issues: write
  pull-requests: write
  statuses: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Create/update PR preview comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const themeId = "${{ inputs.theme_id }}"
            const themeName = "${{ inputs.theme_name }}"
            const shortSha = "${{ github.event.pull_request.head.sha }}".substring(0,7)
            const baseUrl = "${{ secrets.SHOPIFY_STORE }}"
            const themePreviewUrl = `https://${baseUrl}/?preview_theme_id=${themeId}`
            const themeEditorUrl = `https://${baseUrl}/admin/themes/${themeId}/editor`

            if (!themeId || themeId === "null") {
              core.info("No Theme ID found — skipping comment.")
              return
            }

            const prNumber =
              context.payload.pull_request?.number ??
              context.issue.number

            // Hidden marker allows reliable future updates
            const MARKER = "<!-- shopify-preview-comment -->"

            const body = `${MARKER}
            ## 🧪 Shopify Preview Environment

            ### ✅ Deployment Status
            Preview theme successfully deployed.

            **Theme:** ${themeName}  
            **Commit:** \`${shortSha}\`

            ### 🔗 Preview
            ➡️ **[Open Shopify Preview](${themePreviewUrl})**
            ➡️ **[Open Shopify Theme Editor](${themeEditorUrl})**

            ---
            _Last updated automatically by CI_`

            // Fetch existing comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            // Find existing preview comment using marker
            const existing = comments.find(c =>
              c.user.type === "Bot" &&
              c.body.includes(MARKER)
            )

            if (existing) {
              core.info("Updating existing preview comment")
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              })
            } else {
              core.info("Creating preview comment")
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              })
            }

      - name: Mark preview as ready
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const baseUrl = "${{ secrets.SHOPIFY_STORE }}"
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              context: "Shopify Preview",
              description: "Preview theme deployed",
              target_url: `https://${baseUrl}/?preview_theme_id=${{ inputs.theme_id }}`
            })
